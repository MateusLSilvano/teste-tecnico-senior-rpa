name: CI/CD

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  PYTHONPATH: .

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip

          # Se tiver requirements, usa eles
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          # Deps de dev/test (se existir)
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

          # Fallback: garante ferramentas de teste/lint se não vierem nos requirements
          pip install -U ruff pytest pytest-asyncio httpx anyio testcontainers pika

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Unit tests
        run: |
          python -m pytest -q app/tests/unit

      - name: Integration tests
        run: |
          python -m pytest -q app/tests/integration

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker gcr.io --quiet

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ github.event.repository.name }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
